@media(max-width:900px){#mainLayout{grid-template-columns:1fr;height:auto;}#mainLayout .sidebar{max-height:none;border-right:none;}#map{height:380px;}}

//  MAP
// ═══════════════════════════════════════════════
const map=L.map('map',{center:[64.0,-19.5],zoom:7,zoomControl:true,attributionControl:false});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
let mapLayers=[];

function clearMap(){mapLayers.forEach(l=>map.removeLayer(l));mapLayers=[];}

function hotelMarker(coords,name){
  const ic=L.divIcon({html:`<div style="width:26px;height:26px;background:#1e1e2e;border:2px solid #c084fc;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,.7)">🌙</div>`,iconSize:[26,26],iconAnchor:[13,13],className:''});
  return L.marker(coords,{icon:ic}).bindPopup(`<div style="font-family:system-ui"><strong>🌙 ${name}</strong><br><small style="color:#94a3b8">Overnight</small></div>`,{maxWidth:160});
}

function drawOverview(){
  clearMap();
  const palette=['#ff6b6b','#fbbf24','#4ade80','#38bdf8','#c084fc','#fb923c'];
  Object.entries(ROUTES).forEach(([k,r],i)=>{
    if(r&&r.length) mapLayers.push(L.polyline(r,{color:palette[i]||'#67c8f0',weight:3,opacity:.85}).addTo(map));
  });
  Object.entries(ROUTES).forEach(([k,r],i)=>{
    if(!r||!r.length) return;
    const ic=L.divIcon({html:`<div style="width:24px;height:24px;background:${palette[i]||'#67c8f0'};border-radius:50%;border:2px solid white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:white;box-shadow:0 2px 8px rgba(0,0,0,.6)">${i+1}</div>`,iconSize:[24,24],iconAnchor:[12,12],className:''});
    mapLayers.push(L.marker(r[0],{icon:ic}).addTo(map));
  });
  // Show the 3 chill options as question marks
  CHILL_OPTIONS.forEach(opt=>{
    const ic=L.divIcon({html:`<div style="width:26px;height:26px;background:#1e3252;border:2px dashed #c084fc;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,.6)">?</div>`,iconSize:[26,26],iconAnchor:[13,13],className:''});
    mapLayers.push(L.marker(opt.coords,{icon:ic}).bindPopup(`<div style="font-family:system-ui"><strong>${opt.emoji} ${opt.name.split('—')[0].trim()}</strong><br><small style="color:#94a3b8">Option for D7–D10</small></div>`,{maxWidth:200}).addTo(map));
  });
  Object.values(HOTELS_MAP).forEach(h=>{if(h) mapLayers.push(hotelMarker(h.coords,h.name).addTo(map));});
  map.setView([64.0,-20.5],7);
}

function drawDay(key){
  clearMap();
  const day=DAYS[key],route=ROUTES[key];
  if(route) mapLayers.push(L.polyline(route,{color:day.color,weight:4,opacity:.9}).addTo(map));
  (day.stops||[]).forEach((s,i)=>{
    const ic=L.divIcon({html:`<div style="min-width:24px;height:24px;background:${day.color};border-radius:12px;border:2px solid white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:white;padding:0 5px;box-shadow:0 2px 8px rgba(0,0,0,.6)">${i+1}</div>`,iconSize:[24,24],iconAnchor:[12,12],className:''});
    mapLayers.push(L.marker(s.coords,{icon:ic}).bindPopup(`<div style="font-family:system-ui;max-width:200px"><strong>${s.name}</strong><br><small style="color:#94a3b8">${s.desc.substring(0,80)}…</small></div>`,{maxWidth:220}).addTo(map));
  });
  const hotel=HOTELS_MAP[key];
  if(hotel) mapLayers.push(hotelMarker(hotel.coords,hotel.name).addTo(map));
  map.setView(day.center,day.zoom);
}

function drawChoiceMap(){
  clearMap();
  // Draw all 3 option routes in dashed style
  const colors=['#4ade80','#67c8f0','#f8c95a'];
  CHILL_OPTIONS.forEach((opt,i)=>{
    mapLayers.push(L.polyline(opt.routeFromVik,{color:colors[i],weight:3,opacity:.7,dashArray:'8,5'}).addTo(map));
    const ic=L.divIcon({html:`<div style="width:30px;height:30px;background:${colors[i]}20;border:2px solid ${colors[i]};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,.6)">${opt.emoji}</div>`,iconSize:[30,30],iconAnchor:[15,15],className:''});
    mapLayers.push(L.marker(opt.coords,{icon:ic}).bindPopup(`<div style="font-family:system-ui"><strong>${opt.emoji} ${opt.name.split('—')[0].trim()}</strong></div>`,{maxWidth:200}).addTo(map));
  });
  mapLayers.push(hotelMarker([63.419,-19.006],'Vík — D6 end').addTo(map));
  map.setView([64.0,-21.0],7);
}

function focusStop(lat,lng){map.setView([lat,lng],13);}

function renderTags(tags){
  const l={must:'⭐ Must-See',book:'📅 Book Ahead',free:'✓ Free',paid:'€ Paid'};
  return(tags||[]).map(t=>`<span class="tag ${t}">${l[t]||t}</span>`).join('');
}

function renderVibes(vibes){
  const l={romantic:'💜 Romantic',local:'🧊 Local Pick',cheap:'✓ Budget',upscale:'✨ Upscale',must:'⭐ Must'};
  return(vibes||[]).map(v=>`<span class="vibe ${v}">${l[v]||v}</span>`).join('');
}

function renderDayContent(key){
  const d=DAYS[key];
  const ln=DAY_LOVE_NOTES[key];
  const fClasses={easy:'feas-easy',full:'feas-full',tight:'feas-tight'};
  return `
    ${ln?`<div class="couple-card" style="margin-bottom:.85rem">
      <div class="couple-avatar">${ln.emoji}</div>
      <div class="couple-card-text">
        <h3>Luc ♥ Fahad · Day ${d.num}</h3>
        <p>${ln.note}</p>
      </div>
    </div>`:''}
    <div class="day-badge" style="color:${d.color}">DAY ${d.num}</div>
    <div class="day-title">${d.title}</div>
    <div class="day-subtitle">${d.subtitle}</div>
    <div class="day-meta"><span class="meta-chip">🛣️ ${d.km}</span><span class="meta-chip">⏱️ ${d.drive}</span><span class="meta-chip">🌙 ${d.night}</span></div>
    ${d.feasibility?`
    <div class="feasibility ${fClasses[d.feasibility.level]||'feas-full'}">
      <div class="icon">⏱</div>
      <p><strong>${d.feasibility.label}</strong> — ${d.feasibility.note}</p>
    </div>`:''}
    <div style="margin-top:.75rem">
      ${d.stops.map((s,i)=>`
        <div class="stop-card" style="--stop-color:${d.color}" onclick="focusStop(${s.coords[0]},${s.coords[1]})">
          <div class="stop-header">
            <div class="stop-icon">${s.icon}</div>
            <div><div class="stop-name">${i+1}. ${s.name}</div><div class="stop-type">${s.type}</div></div>
          </div>
          <div class="stop-desc">${s.desc}</div>
          ${s.tags&&s.tags.length?`<div class="stop-tags">${renderTags(s.tags)}</div>`:''}
          ${s.tip?`<div class="tip-box"><strong>💡 Tip:</strong> ${s.tip}</div>`:''}
          ${s.warn?`<div class="warn-box">${s.warn}</div>`:''}
        </div>
      `).join('')}
    </div>
    ${d.restaurants&&d.restaurants.length?`
    <details class="collapsible resto">
      <summary>🍽️ Where to Eat <span style="font-weight:400;font-size:.72rem;opacity:.6;margin-left:.4rem">${d.restaurants.length} options</span></summary>
      <div class="collapsible-body">
        ${d.restaurants.map(r=>`
          <div class="resto-card">
            <div class="resto-top"><span class="resto-name">${r.name}</span><span class="resto-price">${r.price}</span></div>
            <div class="resto-type">${r.type} · ${r.location}</div>
            <div class="resto-desc">${r.desc}</div>
            ${r.vibes&&r.vibes.length?`<div class="resto-tags">${renderVibes(r.vibes)}</div>`:''}

        `).join('')}

    ${d.hotels&&d.hotels.length?`
    <details class="collapsible night" style="margin-top:.6rem">
      <summary>🌙 Where to Stay — ${d.night}</summary>
      <div class="collapsible-body">

//  TAB SWITCHING
// ═══════════════════════════════════════════════
const FULLWIDTH=['tips','budget','lgbt'];
const TABS=[
  {k:'overview',l:'🗺️ Overview'},
  {k:'day1',l:'D1 · Arrival'},
  {k:'day2',l:'D2 · Reykjavik'},
  {k:'day3',l:'D3 · Þórsmörk'},
  {k:'day4',l:'D4 · Free Day'},
  {k:'day5',l:'D5 · South → Vík'},
  {k:'day6',l:'D6 · Vík'},
  {k:'choose',l:'D7–10 · Chill Base ✦'},
  {k:'tips',l:'💡 Tips'},
  {k:'budget',l:'💰 Budget'},
  {k:'lgbt',l:'🏳️‍🌈 LGBT+'},
];

document.getElementById('mainTabs').innerHTML=TABS.map(t=>`<button class="tab-btn" onclick="switchTab('${t.k}')">${t.l}</button>`).join('');

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{b.classList.toggle('active',TABS[i]&&TABS[i].k===tab);});
  const layout=document.getElementById('mainLayout'),sidebar=document.getElementById('sidebar'),mc=document.getElementById('mapContainer');
  if(FULLWIDTH.includes(tab)){
    layout.classList.add('fullwidth');mc.style.display='none';
    if(tab==='tips')sidebar.innerHTML=renderTips();
    else if(tab==='budget')sidebar.innerHTML=renderBudget();
    else if(tab==='lgbt')sidebar.innerHTML=renderLGBT();
  } else {
    layout.classList.remove('fullwidth');mc.style.display='block';
    setTimeout(()=>map.invalidateSize(),50);
    if(tab==='overview'){sidebar.innerHTML=renderOverview();drawOverview();}
    else if(tab==='choose'){sidebar.innerHTML=renderChoiceDay();drawChoiceMap();}
    else{sidebar.innerHTML=renderDayContent(tab);drawDay(tab);}
  }
  sidebar.scrollTop=0;
}

switchTab('overview');
</script>
