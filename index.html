ce": "EUR EUR EUR", "type": "Fish pan - Best intro to Iceland", "desc": "Cast-iron pan of whatever's freshest - cod, trout, langoustine. The signature dish. Book ahead.", "vibes": ["must", "upscale", "local"]}, {"name": "Saegreifinn - Green Shack", "location": "Old Harbour", "price": "EUR EUR", "type": "Lobster soup - Iconic", "desc": "Humarsupa in a green harbour shack. Iceland's most famous 10 EUR bowl of soup.", "vibes": ["must", "local", "cheap"]}, {"name": "Grillmarkadurinn", "location": "City centre", "price": "EUR EUR EUR EUR", "type": "Best restaurant in Reykjavik", "desc": "Reindeer, arctic char, langoustine. If you want to splurge on night one.", "vibes": ["romantic", "upscale"]}], "hotels": [{"name": "Canopy by Hilton Reykjavik", "price": "180-260 EUR/night", "type": "**** - Design hotel - Central"}, {"name": "Apotek Hotel", "price": "160-230 EUR/night", "type": "**** - Converted pharmacy - Unique"}, {"name": "Airbnb Reykjavik Centre", "price": "100-160 EUR/night", "type": "Apartment - Book 2 nights together"}]}, "day2": {"num": 2, "color": "#fbbf24", "title": "Reykjavik - Your day", "subtitle": "Fri May 15 - Pools - Laugavegur - Harbour - Golden Hour", "km": "~15 km", "drive": "Walking only", "night": "Reykjavik (night 2/2)", "center": [64.147, -21.943], "zoom": 13, "feasibility": {"level": "easy", "label": "No agenda - the city at your pace", "note": "No car needed. Reykjavik is best on foot. Sleep in. Go to the pool when you feel like it."}, "stops": [{"name": "Laugardalslaug - The locals' pool", "icon": "P", "type": "Geothermal pool - Social heart of Reykjavik", "coords": [64.143, -21.879], "desc": "Six hot pots from 38-44 C, outdoor lap pool, steam rooms. This is where real Reykjavik happens. Not the Blue Lagoon - better.", "tags": ["must", "paid"], "tip": "Entry ~8 EUR. Nude shower required (mandatory by law, completely normal). Morning is best."}, {"name": "Thingholt Neighbourhood", "icon": "M", "type": "Most charming area in the city", "coords": [64.143, -21.929], "desc": "Walk the streets around Hallgrimskirkja - painted corrugated iron houses, cats on windowsills, tiny cafes. The real Reykjavik that tourists miss.", "tags": ["free"]}, {"name": "Laugavegur - Wander & shop", "icon": "S", "type": "Main street - Cafes - Souvenirs", "coords": [64.145, -21.934], "desc": "Browse for a lopapeysa (wool sweater), Brennivin, skyr, local design. The Handknitting Association of Iceland sells the real thing.", "tags": []}, {"name": "Old Harbour - Sunset walk", "icon": "H", "type": "Harbour - Cafes - Mountains", "coords": [64.151, -21.955], "desc": "Watch the snowcapped mountains across the bay turn pink in the late evening light. Dinner at the water.", "tags": ["free"]}], "restaurants": [{"name": "Braud & Co", "location": "Frakkastigur", "price": "EUR", "type": "Best bakery in Iceland - Breakfast", "desc": "Cinnamon roll, cardamom bun, coffee. The legendary morning stop.", "vibes": ["must", "local", "cheap"]}, {"name": "Cafe Babalu", "location": "Skolavordustigur", "price": "EUR EUR", "type": "Quirky cafe - Lunch", "desc": "Eccentric and charming - soup, sandwiches, homemade cakes. Near Hallgrimskirkja.", "vibes": ["local", "cheap"]}, {"name": "Kopar", "location": "Old Harbour", "price": "EUR EUR EUR EUR", "type": "Dinner - Best harbour view", "desc": "Langoustine bisque, local fish, excellent wine. Best dinner view in Reykjavik. Book ahead.", "vibes": ["romantic", "upscale", "must"]}], "hotels": [{"name": "Same Reykjavik accommodation", "price": "Night 2/2", "type": "No checkout - stay and enjoy the city"}]}, "day3": {"num": 3, "color": "#4ade80", "title": "Reykjavik -> Hvolsvollur - South waterfalls", "subtitle": "Sat May 16 - Drive 1h30 - Seljalandsfoss - Skogafoss", "km": "~160 km", "drive": "~2h30 total", "night": "Hvolsvollur (night 1/8)", "center": [63.65, -20.0], "zoom": 9, "feasibility": {"level": "easy", "label": "Gentle transition to base", "note": "Checkout Reykjavik in the morning. 1h30 east on Route 1 to Hvolsvollur. Drop the bags. Afternoon: Seljalandsfoss (30 min away) then Skogafoss (45 min). Dinner back in the village."}, "stops": [{"name": "Hvolsvollur - Your 8-night base", "icon": "H", "type": "Village - Route 1 - South base", "coords": [63.75, -20.233], "desc": "Small village on Route 1, perfectly placed for day trips. The whole south coast within driving distance. You sleep here 8 nights - really unpack, settle in.", "tags": [], "tip": "LAVA Centre in the village = good coffee/museum stop if you want a geology intro. Bonus = yellow supermarket, stock up for picnics."}, {"name": "Seljalandsfoss - Walk behind the water", "icon": "W", "type": "Waterfall - Walk behind it", "coords": [63.615, -19.988], "desc": "A path loops behind the curtain of water. 60m drop, emerald moss. You will get misted. Don't skip Gljufrabui - a hidden waterfall in a cave 5 min north along the same cliff.", "tags": ["must", "free"], "tip": "Walk behind it - you'll get soaked if it's windy. Go anyway. Gljufrabui cave: squeeze through a crack in the cliff, completely surreal."}, {"name": "Skogafoss - The mighty one", "icon": "W", "type": "Waterfall - Rainbow", "coords": [63.532, -19.511], "desc": "60m wide, 60m tall. One of the most powerful waterfalls in Iceland. Climb the 370 steps to the top for a full valley view. A rainbow sits in the mist on sunny mornings.", "tags": ["must", "free"], "tip": "Climb the stairs - the valley view from the top is worth the 10 minutes."}], "restaurants": [{"name": "Eldsto Art Cafe", "location": "Hvolsvollur", "price": "EUR EUR", "type": "Village bistro - Dinner", "desc": "Homemade soup, lamb, cakes. Pottery studio next door. Laid-back atmosphere.", "vibes": ["local", "cheap"]}, {"name": "Gallery Pizza", "location": "Hvolsvollur", "price": "EUR EUR", "type": "Wood-fired pizza", "desc": "Surprise find - excellent pizza in the village. Perfect for a quiet night.", "vibes": ["local"]}, {"name": "Sol Restaurant (Hotel Hvolsvollur)", "location": "Hvolsvollur", "price": "EUR EUR EUR", "type": "Hotel dinner - Local", "desc": "Lamb, fish, Icelandic dishes. The most complete option in the village.", "vibes": ["upscale", "local"]}], "hotels": [{"name": "Hotel Hvolsvollur", "price": "140-200 EUR/night", "type": "*** - Village centre - Breakfast included - Book 8 nights"}, {"name": "The Barn Hostel/Hotel", "price": "100-160 EUR/night", "type": "Rustic design - Hekla view"}, {"name": "Airbnb Hvolsvollur", "price": "90-150 EUR/night", "type": "Houses & cottages - Kitchen equipped - 8 nights"}]}, "day4": {"num": 4, "color": "#38bdf8", "title": "Reykjadalur Hot River Hike", "subtitle": "Sun May 17 - Hike to a steaming valley you can bathe in", "km": "~140 km", "drive": "~2h30 total", "night": "Hvolsvollur (night 2/8)", "center": [64.02, -21.21], "zoom": 10, "feasibility": {"level": "full", "label": "Hike + soak day - takes most of the day", "note": "1h15 drive from Hvolsvollur to Hveragerdi. From there, 3km hike (1h up, gaining 300m) to the hot river. You can bathe in it - the water gets hotter the higher you go. Total day ~5-6h including drive."}, "stops": [{"name": "Hveragerdi - Trailhead", "icon": "T", "type": "Geothermal village - Free parking", "coords": [64.018, -21.19], "desc": "Small geothermal village known for its steaming earth and greenhouses. Park at the Reykjadalur trailhead just north of town. Free.", "tags": [], "tip": "Public toilets and a small cafe at the trailhead. Take swimwear, towel, water and snacks - none of that exists on the trail."}, {"name": "Reykjadalur - The Hot River", "icon": "H", "type": "Geothermal river hike - 3km up - Must-do", "coords": [64.03, -21.213], "desc": "A green valley with steaming vents and bubbling mud. The river itself runs hot - the higher upstream you walk, the warmer it gets. Wooden boardwalks for changing. Find a spot at the right temperature and lie down.", "tags": ["must", "free"], "tip": "1h hike up, 45 min back. Bring shoes that can get wet on rocks. The pools nearer the top are hotter - find your zone."}, {"name": "Hveragerdi Greenhouse Stop", "icon": "C", "type": "Hot dog museum / coffee", "coords": [64.001, -21.184], "desc": "Back from the hike, a coffee stop in town. Worth a quick wander - everything in town is geothermally heated, including the swimming pool.", "tags": [], "tip": "Skyrgerdin or Almar Bakari for a snack. The town pool (very local) is another option if you have time."}, {"name": "Selfoss - Late lunch on the way back", "icon": "S", "type": "Town - 20 min from Hveragerdi", "coords": [63.934, -20.996], "desc": "Bigger town on the way back to Hvolsvollur. Good late lunch options. Bonus supermarket here if you need supplies for the rest of the trip.", "tags": [], "tip": "Tryggvaskali for a sit-down meal, or Kaffi Krokurinn by the river."}], "restaurants": [{"name": "Tryggvaskali", "location": "Selfoss", "price": "EUR EUR EUR", "type": "Riverside dining - Best in Selfoss", "desc": "Beautifully restored old building by the river. Lamb, fish, soups. A proper sit-down spot.", "vibes": ["upscale", "local", "must"]}, {"name": "Almar Bakari", "location": "Hveragerdi", "price": "EUR", "type": "Bakery - Quick stop", "desc": "Coffee and pastries before or after the hike. Cheap and friendly.", "vibes": ["local", "cheap"]}, {"name": "Sol Restaurant", "location": "Hvolsvollur - on return", "price": "EUR EUR EUR", "type": "Village dinner", "desc": "Back at base. Lamb, fish, local plates.", "vibes": ["upscale", "local"]}], "hotels": [{"name": "Same base Hvolsvollur", "price": "Night 2/8", "type": "No checkout"}]}, "day5": {"num": 5, "color": "#c084fc", "title": "Vik - Reynisfjara - Dyrholaey", "subtitle": "Mon May 18 - Black sand - Puffins - Basalt stacks", "km": "~210 km", "drive": "~3h total", "night": "Hvolsvollur (night 3/8)", "center": [63.45, -19.2], "zoom": 10, "feasibility": {"level": "easy", "label": "Classic south coast day", "note": "1h from Hvolsvollur to Vik. Reynisfjara on arrival, lunch in the village, Dyrholaey in the afternoon (puffins), back by 7pm. A perfect day."}, "stops": [{"name": "Reynisfjara - Iceland's most dramatic beach", "icon": "B", "type": "Black sand - Basalt columns", "coords": [63.403, -19.128], "desc": "Jet-black volcanic sand, towering hexagonal basalt columns, Reynisdrangar sea stacks. Raw, wild, otherworldly. 10 min from Vik - start here first thing.", "tags": ["must", "free"], "warn": "WARNING: Sneaker waves are deadly here. Stay at least 20m from the water's edge at all times. People have died."}, {"name": "Vik - Village stop", "icon": "V", "type": "Village - Church on the hill", "coords": [63.419, -19.006], "desc": "Small village at Iceland's southernmost point. Red-and-white church on the hill, view of the black beach. Lunch here. Short walk on Vikurfjara.", "tags": []}, {"name": "Dyrholaey - Cliffs & puffins", "icon": "P", "type": "Nature reserve - Promontory", "coords": [63.402, -19.122], "desc": "Spectacular promontory with a natural arch in the sea. Puffins nest in the cliffs mid-May to late August. Breathtaking view east to Reynisfjara and the black beach west.", "tags": ["must", "free"], "tip": "Free. Lighthouse at the top. Puffins return at dusk (8-10pm) - the best hour. Easy path."}], "restaurants": [{"name": "Skal! Restaurant", "location": "Vik", "price": "EUR EUR EUR", "type": "Lunch in Vik", "desc": "Local lamb, fish and good wine. The best in town. Book a table on arrival.", "vibes": ["upscale", "romantic", "must"]}, {"name": "Sudur-Vik", "location": "Vik", "price": "EUR EUR", "type": "Village cafe", "desc": "Soup, sandwiches, coffee. Good lunch stop if Skal! is full.", "vibes": ["local", "cheap"]}, {"name": "Eldsto Art Cafe", "location": "Hvolsvollur", "price": "EUR EUR", "type": "Village dinner on return", "desc": "On the way back. Soup + beer. Bed calling.", "vibes": ["local", "cheap"]}], "hotels": [{"name": "Same base Hvolsvollur", "price": "Night 3/8", "type": "No checkout"}]}, "day6": {"num": 6, "color": "#fb923c", "title": "Solheimajokull - Seljavallalaug", "subtitle": "Tue May 19 - Glacier walk - Hidden 1923 pool", "km": "~150 km", "drive": "~2h30 total", "night": "Hvolsvollur (night 4/8)", "center": [63.55, -19.5], "zoom": 10, "feasibility": {"level": "full", "label": "Glacier walk to book - physical but short", "note": "Glacier walk at 10am or 2pm, 3h on the ice (crampons + gear provided). Book 2+ weeks ahead with Icelandic Mountain Guides. Seljavallalaug in the afternoon - hidden mountain pool. Back at Hvolsvollur 7pm."}, "stops": [{"name": "Solheimajokull - Glacier walk", "icon": "I", "type": "Guided glacier hike - 3h - Crampons included", "coords": [63.526, -19.367], "desc": "Crampons and ice axe on Solheimajokull - a tongue of Myrdalsjokull. Sapphire-blue crevasses, total silence, thousand-year-old ice. Guide and gear included. 3h on the ice. More accessible than Skaftafell, ideal from Hvolsvollur (~1h drive).", "tags": ["must", "book", "paid"], "tip": "Book with Icelandic Mountain Guides - ~70-90 EUR/person. Waterproofs mandatory. Leave the base 1h before."}, {"name": "Seljavallalaug - Hidden pool", "icon": "H", "type": "Natural pool - Free - 1923", "coords": [63.564, -19.605], "desc": "Iceland's oldest swimming pool, hidden in a mountain valley. Green geothermal water, basic changing rooms, completely free. 20-min hike each way. The perfect reward after the glacier.", "tags": ["must", "free"], "tip": "Free. Bring a towel. The approach through the valley is half the magic. Warm rather than hot (~30 C)."}], "restaurants": [{"name": "Gallery Pizza", "location": "Hvolsvollur", "price": "EUR EUR", "type": "Pizza on return", "desc": "You come back frozen then thawed - pizza and beer, perfect.", "vibes": ["local"]}, {"name": "Sol Restaurant", "location": "Hvolsvollur", "price": "EUR EUR EUR", "type": "Village dinner", "desc": "Lamb and fish. More substantial if you want to sit down properly.", "vibes": ["upscale", "local"]}], "hotels": [{"name": "Same base Hvolsvollur", "price": "Night 4/8", "type": "No checkout"}]}, "day7": {"num": 7, "color": "#38bdf8", "title": "Jokulsarlon - Diamond Beach", "subtitle": "Wed May 20 - Long day - Icebergs - Ice on black sand", "km": "~640 km round trip", "drive": "~8h driving (the biggest day)", "night": "Hvolsvollur (night 5/8)", "center": [64.0, -17.5], "zoom": 7, "feasibility": {"level": "tight", "label": "Big day - depart 7am, return 10pm", "note": "The only long day of the trip. 3h30 driving each way. Evening light (8-10pm) on the icebergs = unreal. Picnic stop at Kirkjubaejarklaustur. Late return, quick dinner or supermarket."}, "stops": [{"name": "Kirkjubaejarklaustur - Coffee/lunch stop", "icon": "C", "type": "Village - ~2h from base", "coords": [63.789, -18.058], "desc": "Small village on Route 1. Coffee at Systrakaffi or N1. Fill up on petrol. Toilets. Another 1h30 to Jokulsarlon.", "tags": [], "tip": "Last real service before Jokulsarlon. Sandwich + coffee = 15 EUR."}, {"name": "Fjadrargljufur Canyon", "icon": "C", "type": "Canyon - 45 min walk - Optional", "coords": [63.776, -18.172], "desc": "A 100m deep canyon carved by a glacial river. Path along the rim winds through alien formations. 15-min detour from Route 1. Do it on the way out if timing allows, otherwise on the way back.", "tags": ["must", "free"], "tip": "45 min walk. Best in early morning before the buses. Skip if you want to maximise Jokulsarlon."}, {"name": "Jokulsarlon - Iceberg lagoon", "icon": "I", "type": "Glacial lagoon - Unreal", "coords": [64.078, -16.23], "desc": "Icebergs broken off Breidamerkurjokull drift slowly toward the sea, lit turquoise from below. Some are the size of houses. Seals swim between them. One of the most surreal places on the planet.", "tags": ["must", "free"], "tip": "Minimum 1h30. Optional boat tour (~45 EUR). Even from the shore it's extraordinary. Aim for 6-8pm for golden light."}, {"name": "Diamond Beach - Ice on black sand", "icon": "D", "type": "Black beach - Ice crystals", "coords": [64.043, -16.178], "desc": "Icebergs stranded on black volcanic sand - they shine like diamonds in May's low light. Walk between them. Some are perfectly transparent. The contrast is unreal.", "tags": ["must", "free"], "tip": "Across Route 1 from the lagoon. 30-40 min. Evening light (8-10pm) is the best."}], "restaurants": [{"name": "Bonus picnic", "location": "Take from Hvolsvollur", "price": "EUR", "type": "On the road", "desc": "Sandwiches + skyr + fruit. Saves time and money - there's almost nothing between Vik and Hofn.", "vibes": ["cheap", "local"]}, {"name": "Systrakaffi", "location": "Kirkjubaejarklaustur", "price": "EUR EUR", "type": "Mid-route coffee stop", "desc": "Soup + sandwich + coffee. A civilised break.", "vibes": ["local"]}, {"name": "Gas station Vik", "location": "Vik - on return", "price": "EUR", "type": "Burger / hot dog on return", "desc": "You come back late and starving. N1 or Kronan = quick fix. Or Bonus supermarket before closing (8pm).", "vibes": ["cheap"]}], "hotels": [{"name": "Same base Hvolsvollur", "price": "Night 5/8", "type": "Late return - no checkout tomorrow"}]}, "day8": {"num": 8, "color": "#67c8f0", "title": "Westman Islands - Vestmannaeyjar", "subtitle": "Thu May 21 - Ferry - Volcano - Puffins", "km": "~60 km drive + ferry", "drive": "30 min drive + 35 min ferry", "night": "Hvolsvollur (night 6/8)", "center": [63.43, -20.27], "zoom": 11, "feasibility": {"level": "easy", "label": "Chill day after the big one", "note": "You need recovery. Ferry from Landeyjahofn (30 min from Hvolsvollur) to Heimaey - the main island. Volcano, puffins, pubs, black beach. Evening ferry back."}, "stops": [{"name": "Ferry Landeyjahofn -> Heimaey", "icon": "F", "type": "Herjolfur ferry - 35 min", "coords": [63.547, -20.116], "desc": "Ferry leaves from the small port of Landeyjahofn. Book the car on board OR leave it on shore and go on foot (cheaper). Quick crossing with spectacular views of the island's cliffs.", "tags": ["book", "paid"], "tip": "herjolfur.is - book ahead. Car return trip ~70 EUR + 2 foot passengers. Foot only ~30 EUR/person return. Fixed departures - check the day before."}, {"name": "Eldfell - The 1973 volcano", "icon": "V", "type": "Volcano hike - 1h30 round trip", "coords": [63.435, -20.247], "desc": "In 1973, this volcano erupted overnight and swallowed half the town. You now walk on still-warm lava. View over the whole island and archipelago from the summit.", "tags": ["must", "free"], "tip": "Black ground, red in places - stones still warm to the touch in some areas. 1h30 return."}, {"name": "Storhofdi - Puffin cliffs", "icon": "P", "type": "Southern cape - Puffin colony", "coords": [63.401, -20.288], "desc": "Iceland's largest puffin colony. A free observation shelter lets you see them at 2m without disturbing them. The windiest point in Europe - they say.", "tags": ["must", "free"], "tip": "Go in the afternoon (3-6pm). Bring a windproof jacket - seriously."}, {"name": "Heimaey - Village & port", "icon": "T", "type": "Town - Pubs - Eldheimar museum", "coords": [63.434, -20.273], "desc": "The town that survived the eruption. Eldheimar museum = a house buried under lava, excavated and preserved (~20 EUR). Otherwise, harbour cafe, watch the boats, have a beer.", "tags": ["paid"]}], "restaurants": [{"name": "Slippurinn", "location": "Heimaey", "price": "EUR EUR EUR EUR", "type": "Acclaimed restaurant - Harbour view", "desc": "The most creative restaurant on the island, in an old boat shed. Ultra-local produce. Book absolutely.", "vibes": ["romantic", "upscale", "must"]}, {"name": "Gott", "location": "Heimaey", "price": "EUR EUR", "type": "Healthy - Casual lunch", "desc": "Bowls, soups, smoothies. Good lunch stop before the volcano.", "vibes": ["local", "cheap"]}, {"name": "Gallery Pizza", "location": "Hvolsvollur - on return", "price": "EUR EUR", "type": "Pizza on return", "desc": "Ferry back + 30 min drive + pizza. The trip's routine.", "vibes": ["local"]}], "hotels": [{"name": "Same base Hvolsvollur", "price": "Night 6/8", "type": "No checkout"}]}, "day9": {"num": 9, "color": "#c084fc", "title": "Loose Ends - Skogar & DC-3 Wreck", "subtitle": "Fri May 22 - Folk museum - Hidden waterfall - Iconic plane wreck", "km": "~140 km", "drive": "~2h30 total", "night": "Hvolsvollur (night 7/8)", "center": [63.53, -19.5], "zoom": 10, "feasibility": {"level": "easy", "label": "Soft, slow day - pick what you like", "note": "You've done the heavy lifting. Today is a buffet of small south-coast sights: a folk museum, a hidden waterfall right next to Skogafoss, a plane wreck on black sand, optional Hekla visitor centre. No pressure, mix and match."}, "stops": [{"name": "Skogar Folk Museum", "icon": "T", "type": "Turf houses - Best folk museum in Iceland", "coords": [63.516, -19.515], "desc": "An open-air museum of restored turf houses, old farm buildings and a small church - all from the 18th-19th centuries. The inside collection is one of the best ways to understand traditional Icelandic life. Right next to Skogafoss.", "tags": ["must", "paid"], "tip": "~25 EUR/person. 1h30-2h. Go in the morning. The reconstructed turf church is the highlight."}, {"name": "Kvernufoss - Hidden Waterfall", "icon": "W", "type": "Waterfall - 15 min walk - Almost empty", "coords": [63.522, -19.501], "desc": "Right next to Skogafoss but almost nobody finds it. Walk past the Skogar Museum and through a fence, follow the river up the valley. A 30m waterfall in a green canyon - you can walk behind it like Seljalandsfoss but solo.", "tags": ["must", "free"], "tip": "15 min walk each way. The trail starts behind the museum. Free."}, {"name": "Solheimasandur DC-3 Plane Wreck", "icon": "P", "type": "Iconic photo spot - Black sand", "coords": [63.491, -19.364], "desc": "A US Navy DC-3 crashed here in 1973 on a black sand desert. Everyone survived but the wreck was abandoned. Now it sits on the sand like a Mars set. Most photographed wreck in Iceland.", "tags": ["must", "free"], "tip": "Free parking on Route 1. 4km walk each way on flat sand (1h each way) OR pay ~25 EUR for a shuttle bus. Go late afternoon for the light."}, {"name": "Hekla Volcano Viewpoint (optional)", "icon": "V", "type": "Visitor centre + viewpoint - 30 min from base", "coords": [64.0, -19.665], "desc": "Iceland's most active volcano, 1,491m, last erupted 2000. The visitor centre at Leirubakki has interactive exhibits and the road up gives close views. Optional if you have energy left.", "tags": [], "tip": "Skip if tired. The route 26 toward the volcano is dramatic on its own."}], "restaurants": [{"name": "Mia's Country Grill (Skogafoss)", "location": "Skogar", "price": "EUR EUR", "type": "Lunch - Burgers & lamb", "desc": "Right at Skogafoss - good burgers and Icelandic lamb in a casual setting. Easy lunch stop after the museum.", "vibes": ["local"]}, {"name": "Hotel Ranga Restaurant", "location": "Between Hella and Hvolsvollur", "price": "EUR EUR EUR EUR", "type": "Splurge dinner - Local game", "desc": "Iceland's most famous countryside hotel restaurant. Reindeer, langoustine, Icelandic lamb done properly. Book ahead. 15 min from Hvolsvollur.", "vibes": ["romantic", "upscale", "must"]}, {"name": "Sol Restaurant", "location": "Hvolsvollur", "price": "EUR EUR EUR", "type": "Village dinner", "desc": "Solid local plate on the way back to base.", "vibes": ["upscale", "local"]}], "hotels": [{"name": "Same base Hvolsvollur", "price": "Night 7/8", "type": "No checkout"}]}, "day10": {"num": 10, "color": "#fbbf24", "title": "Golden Circle - Secret Lagoon", "subtitle": "Sat May 23 - Thingvellir - Geysir - Gullfoss - Soak", "km": "~280 km", "drive": "~4h total", "night": "Hvolsvollur (night 8/8)", "center": [64.3, -20.6], "zoom": 9, "feasibility": {"level": "easy", "label": "Last full day - classic loop", "note": "Iceland's classic triangle. 1h30 to Thingvellir. Geysir and Gullfoss back to back. Soak at Secret Lagoon at the end of the day. Back at Hvolsvollur for dinner."}, "stops": [{"name": "Thingvellir - Tectonic rift - U const map = L.map('map',{center:[64.2,-19.8],zoom:7,zoomControl:true,attributionControl:false});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
let mapLayers = [];

function clearMap(){mapLayers.forEach(l=>map.removeLayer(l));mapLayers=[];}

function hotelMarker(coords,name){
  const ic = L.divIcon({html:'<div style="width:26px;height:26px;background:#1e1e2e;border:2px solid #c084fc;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,.7)">N</div>',iconSize:[26,26],iconAnchor:[13,13],className:''});
  return L.marker(coords,{icon:ic}).bindPopup('<div style="font-family:system-ui"><strong>' + name + '</strong><br><small style="color:#94a3b8">Overnight</small></div>',{maxWidth:160});
}

function drawOverview(){
  clearMap();
  const palette = ['#ff6b6b','#fbbf24','#4ade80','#38bdf8','#c084fc','#fb923c','#38bdf8','#67c8f0','#c084fc','#fbbf24','#ff6b6b'];
  Object.entries(ROUTES).forEach(([k,r],i)=>{
    if(r&&r.length) mapLayers.push(L.polyline(r,{color:palette[i]||'#67c8f0',weight:3,opacity:.8}).addTo(map));
  });
  Object.entries(ROUTES).forEach(([k,r],i)=>{
    if(!r||!r.length) return;
    const ic = L.divIcon({html:'<div style="width:24px;height:24px;background:'+(palette[i]||'#67c8f0')+';border-radius:50%;border:2px solid white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:white;box-shadow:0 2px 8px rgba(0,0,0,.6)">'+(i+1)+'</div>',iconSize:[24,24],iconAnchor:[12,12],className:''});
    mapLayers.push(L.marker(r[0],{icon:ic}).addTo(map));
  });
  mapLayers.push(hotelMarker([64.147,-21.943],'Reykjavik - 2 nights').addTo(map));
  mapLayers.push(hotelMarker([63.750,-20.233],'Hvolsvollur - 8 nights').addTo(map));
  map.setView([64.2,-19.8],7);
}

function drawDay(key){
  clearMap();
  const day = DAYS[key], route = ROUTES[key];
  if(route) mapLayers.push(L.polyline(route,{color:day.color,weight:4,opacity:.9}).addTo(map));
  (day.stops||[]).forEach((s,i)=>{
    const ic = L.divIcon({html:'<div style="min-width:24px;height:24px;background:'+day.color+';border-radius:12px;border:2px solid white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:white;padding:0 5px;box-shadow:0 2px 8px rgba(0,0,0,.6)">'+(i+1)+'</div>',iconSize:[24,24],iconAnchor:[12,12],className:''});
    mapLayers.push(L.marker(s.coords,{icon:ic}).bindPopup('<div style="font-family:system-ui;max-width:200px"><strong>'+s.name+'</strong><br><small style="color:#94a3b8">'+s.desc.substring(0,80)+'...</small></div>',{maxWidth:220}).addTo(map));
  });
  const hotel = HOTELS_MAP[key];
  if(hotel) mapLayers.push(hotelMarker(hotel.coords,hotel.name).addTo(map));
  map.setView(day.center,day.zoom);
}

function focusStop(lat,lng){map.setView([lat,lng],13);}

function renderTags(tags){
  const l = {must:'* Must',book:'Book',free:'Free',paid:'Paid'};
  return (tags||[]).map(t=>'<span class="tag '+t+'">'+(l[t]||t)+'</span>').join('');
}
function renderVibes(vibes){
  const l = {romantic:'Romantic',local:'Local',cheap:'Budget',upscale:'Upscale',must:'Must'};
  return (vibes||[]).map(v=>'<span class="vibe '+v+'">'+(l[v]||v)+'</span>').join('');
}

function renderDayContent(key){
  const d = DAYS[key], ln = DAY_LOVE_NOTES[key];

  html += '<div class="day-badge" style="color:'+d.color+'">DAY '+d.num+'</div>';

  html += '<div class="day-meta"><span class="meta-chip">'+d.km+'</span><span class="meta-chip">'+d.drive+'</span><span class="meta-chip">'+d.night+'</span></div>';

const FULLWIDTH = ['tips','budget','lgbt'];
const TABS = [
  {k:'overview',l:'Overview'},
  {k:'day1',l:'D1 - Arrival'},
  {k:'day2',l:'D2 - Reykjavik'},
  {k:'day3',l:'D3 - Hvolsvollur'},
  {k:'day4',l:'D4 - Reykjadalur'},
  {k:'day5',l:'D5 - Vik'},
  {k:'day6',l:'D6 - Glacier'},
  {k:'day7',l:'D7 - Jokulsarlon'},
  {k:'day8',l:'D8 - Westman'},
  {k:'day9',l:'D9 - Skogar'},
  {k:'day10',l:'D10 - Golden Circle'},
  {k:'day11',l:'D11 - Home'},
  {k:'tips',l:'Tips'},
  {k:'budget',l:'Budget'},
  {k:'lgbt',l:'LGBT+'},
];

document.getElementById('mainTabs').innerHTML = TABS.map(t=>'<button class="tab-btn" onclick="switchTab(\''+t.k+'\')">'+t.l+'</button>').join('');

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{b.classList.toggle('active',TABS[i]&&TABS[i].k===tab);});
  const layout = document.getElementById('mainLayout'), sidebar = document.getElementById('sidebar'), mc = document.getElementById('mapContainer');
  if(FULLWIDTH.includes(tab)){
    layout.classList.add('fullwidth'); mc.style.display = 'none';
    if(tab==='tips') sidebar.innerHTML = renderTips();
    else if(tab==='budget') sidebar.innerHTML = renderBudget();
    else if(tab==='lgbt') sidebar.innerHTML = renderLGBT();
  } else {
    layout.classList.remove('fullwidth'); mc.style.display = 'block';
    setTimeout(()=>map.invalidateSize(),50);
    if(tab==='overview'){ sidebar.innerHTML = renderOverview(); drawOverview(); }
    else { sidebar.innerHTML = renderDayContent(tab); drawDay(tab); }
  }
  sidebar.scrollTop = 0;
}

switchTab('overview');
