<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇮🇸 Luc & Fahad · Iceland · May 2026</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇮🇸</text></svg>">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#0b0d18;--card:#10141f;--border:#1e3252;--primary:#67c8f0;--accent:#a3e635;--gold:#f8c95a;--purple:#c084fc;--orange:#fb923c;--green:#4ade80;--rose:#f472b6;--text:#edf2f7;--muted:#8896aa;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:linear-gradient(160deg,#07090f 0%,#0e1428 40%,#120a1c 100%);padding:2rem 2rem 1.5rem;text-align:center;border-bottom:1px solid rgba(244,114,182,.15);position:relative;overflow:hidden;}
header::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 15% 60%,rgba(103,200,240,.10) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 40%,rgba(244,114,182,.12) 0%,transparent 55%),
    radial-gradient(ellipse at 50% 100%,rgba(192,132,252,.07) 0%,transparent 50%);}
.couple-names{font-size:.95rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);position:relative;margin-bottom:.4rem;}
.couple-names .heart{color:var(--rose);animation:pulse 1.8s ease-in-out infinite;display:inline-block;margin:0 .4rem;font-size:1.1rem;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.28);opacity:.8}}
header h1{font-size:2.4rem;font-weight:900;position:relative;letter-spacing:-.01em;
  background:linear-gradient(100deg,var(--primary) 0%,#a78bfa 50%,var(--rose) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.3rem;}
.tagline{color:var(--muted);font-size:.88rem;position:relative;letter-spacing:.02em;}
.tagline .sep{color:var(--rose);margin:0 .4rem;opacity:.6;}
.aurora-tag{font-size:.74rem;color:rgba(244,114,182,.6);margin-top:.35rem;position:relative;letter-spacing:.06em;}
.tabs{display:flex;overflow-x:auto;background:#050b14;border-bottom:1px solid var(--border);padding:0 1rem;position:sticky;top:0;z-index:200;}
.tabs::-webkit-scrollbar{height:3px;}.tabs::-webkit-scrollbar-thumb{background:var(--border);}
.tab-btn{background:none;border:none;color:var(--muted);padding:.85rem 1.1rem;cursor:pointer;white-space:nowrap;font-size:.82rem;font-weight:600;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.02em;}
.tab-btn:hover{color:var(--text);}.tab-btn.active{color:var(--rose);border-bottom-color:var(--rose);}
.couple-card{background:linear-gradient(135deg,rgba(244,114,182,.08),rgba(103,200,240,.05));border:1px solid rgba(244,114,182,.18);border-radius:12px;padding:.9rem 1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.8rem;}
.couple-avatar{font-size:1.5rem;flex-shrink:0;}
.couple-card-text h3{font-size:.85rem;font-weight:700;color:var(--rose);margin-bottom:.2rem;}
.couple-card-text p{font-size:.75rem;color:var(--muted);line-height:1.55;font-style:italic;}
#mainLayout{display:grid;grid-template-columns:440px 1fr;height:calc(100vh - 130px);}
#mainLayout.fullwidth{grid-template-columns:1fr;height:auto;}
.sidebar{overflow-y:auto;padding:1.25rem;border-right:1px solid var(--border);background:var(--card);}
.sidebar::-webkit-scrollbar{width:4px;}.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
#mainLayout.fullwidth .sidebar{overflow-y:visible;border-right:none;}
#map{width:100%;height:100%;background:#050b14;}
/* DAY HEADER */
.day-badge{display:inline-flex;align-items:center;gap:.4rem;padding:.2rem .7rem;border-radius:999px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem;background:var(--border);color:var(--primary);}
.day-title{font-size:1.35rem;font-weight:700;margin-bottom:.2rem;line-height:1.3;}
.day-subtitle{color:var(--muted);font-size:.82rem;}
.day-meta{display:flex;gap:.75rem;margin-top:.6rem;flex-wrap:wrap;}
.meta-chip{font-size:.75rem;color:var(--muted);display:flex;align-items:center;gap:.3rem;}
/* FEASIBILITY */
.feasibility{display:flex;align-items:flex-start;gap:.6rem;padding:.65rem .9rem;border-radius:8px;font-size:.78rem;line-height:1.55;margin:.8rem 0;}
.feasibility .icon{font-size:1rem;flex-shrink:0;margin-top:.05rem;}
.feasibility p{margin:0;}
.feasibility strong{display:block;margin-bottom:.15rem;font-size:.8rem;}
.feas-easy{background:rgba(74,222,128,.07);border:1px solid rgba(74,222,128,.22);color:#86efac;}
.feas-easy strong{color:var(--green);}
.feas-full{background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.22);color:#fde68a;}
.feas-full strong{color:var(--gold);}
.feas-tight{background:rgba(251,146,60,.08);border:1px solid rgba(251,146,60,.28);color:#fed7aa;}
.feas-tight strong{color:var(--orange);}
/* STOP CARDS */
.stop-card{background:#070d19;border:1px solid var(--border);border-radius:10px;padding:.9rem 1rem;margin-bottom:.6rem;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;}
.stop-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--stop-color,var(--primary));}
.stop-card:hover{border-color:var(--primary);transform:translateX(3px);}
.stop-header{display:flex;align-items:center;gap:.65rem;margin-bottom:.4rem;}
.stop-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;background:var(--border);flex-shrink:0;}
.stop-name{font-weight:600;font-size:.88rem;}.stop-type{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
.stop-desc{font-size:.8rem;color:var(--muted);line-height:1.55;margin-bottom:.45rem;}
.stop-tags{display:flex;gap:.3rem;flex-wrap:wrap;}
.tag{font-size:.68rem;padding:.18rem .45rem;border-radius:4px;background:var(--border);color:var(--muted);}
.tag.must{background:rgba(251,191,36,.15);color:var(--gold);}.tag.book{background:rgba(251,146,60,.15);color:var(--orange);}.tag.free{background:rgba(74,222,128,.15);color:var(--green);}.tag.paid{background:rgba(192,132,252,.15);color:var(--purple);}
.tip-box{background:rgba(56,189,248,.06);border:1px solid rgba(56,189,248,.18);border-radius:8px;padding:.65rem .9rem;font-size:.78rem;color:var(--text);line-height:1.55;margin-top:.5rem;}
.tip-box strong{color:var(--primary);}
.warn-box{background:rgba(251,146,60,.07);border:1px solid rgba(251,146,60,.25);border-radius:8px;padding:.65rem .9rem;font-size:.78rem;color:#fed7aa;line-height:1.55;margin-top:.5rem;}
/* RESTAURANTS */
.resto-section{margin-top:1.25rem;}
.resto-title{font-size:.82rem;font-weight:700;color:var(--gold);margin-bottom:.65rem;display:flex;align-items:center;gap:.4rem;padding-bottom:.4rem;border-bottom:1px solid var(--border);}
.resto-card{background:#070d19;border:1px solid var(--border);border-radius:8px;padding:.75rem;margin-bottom:.45rem;transition:border-color .18s;}
.resto-card:hover{border-color:rgba(251,191,36,.35);}
.resto-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.2rem;}
.resto-name{font-weight:600;font-size:.85rem;}
.resto-price{font-size:.75rem;color:var(--gold);font-weight:700;white-space:nowrap;margin-left:.5rem;}
.resto-type{font-size:.68rem;color:var(--purple);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.3rem;}
.resto-desc{font-size:.77rem;color:var(--muted);line-height:1.5;}
.resto-tags{display:flex;gap:.3rem;flex-wrap:wrap;margin-top:.4rem;}
.vibe{font-size:.67rem;padding:.15rem .4rem;border-radius:4px;}
.vibe.romantic{background:rgba(192,132,252,.15);color:var(--purple);}
.vibe.local{background:rgba(56,189,248,.12);color:var(--primary);}
.vibe.cheap{background:rgba(74,222,128,.12);color:var(--green);}
.vibe.upscale{background:rgba(251,191,36,.12);color:var(--gold);}
.vibe.must{background:rgba(251,146,60,.15);color:var(--orange);}
/* NIGHT CARD */
.night-card{background:rgba(192,132,252,.06);border:1px solid rgba(192,132,252,.18);border-radius:10px;padding:1rem;margin-top:1.25rem;}
.night-title{display:flex;align-items:center;gap:.45rem;font-weight:600;color:var(--purple);margin-bottom:.6rem;font-size:.85rem;}
.hotel-row{padding:.55rem 0;border-bottom:1px solid rgba(255,255,255,.05);}.hotel-row:last-child{border-bottom:none;}
.hotel-name{font-weight:500;font-size:.83rem;}.hotel-meta{display:flex;justify-content:space-between;margin-top:.15rem;}.hotel-type{color:var(--muted);font-size:.72rem;}.hotel-price{color:var(--gold);font-size:.75rem;font-weight:600;}
/* OVERVIEW */
.overview-intro{background:rgba(56,189,248,.06);border:1px solid rgba(56,189,248,.15);border-radius:10px;padding:1rem;margin-bottom:1rem;font-size:.8rem;line-height:1.6;}
.overview-intro strong{color:var(--primary);}
.day-overview-card{background:#070d19;border:1px solid var(--border);border-radius:10px;padding:.85rem 1rem;margin-bottom:.5rem;display:flex;align-items:center;gap:.85rem;cursor:pointer;transition:all .18s;}
.day-overview-card:hover{border-color:var(--primary);background:rgba(56,189,248,.04);}
.day-num{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1rem;flex-shrink:0;}
.day-ov-info h3{font-size:.88rem;font-weight:600;}.day-ov-info p{font-size:.73rem;color:var(--muted);margin-top:.1rem;}
.feas-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.drive-info{margin-left:auto;text-align:right;flex-shrink:0;}.drive-km{font-weight:700;color:var(--primary);font-size:.82rem;}
/* FULL-WIDTH */
.section-wrap{padding:1.5rem 2rem;max-width:1100px;margin:0 auto;}
.section-title{font-size:1.4rem;font-weight:700;margin-bottom:1.25rem;display:flex;align-items:center;gap:.5rem;}
.tips-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:.85rem;}
.tip-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.1rem;}
.tip-card h3{font-size:.9rem;font-weight:600;margin-bottom:.65rem;display:flex;align-items:center;gap:.4rem;}
.tip-card ul{list-style:none;display:flex;flex-direction:column;gap:.4rem;}
.tip-card li{font-size:.78rem;color:var(--muted);padding-left:1.15rem;position:relative;line-height:1.5;}
.tip-card li::before{content:'→';position:absolute;left:0;color:var(--primary);font-size:.7rem;top:.1rem;}
.tip-card li strong{color:var(--text);}
.budget-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:1.25rem;}
.budget-table{width:100%;border-collapse:collapse;font-size:.82rem;}
.budget-table th{text-align:left;padding:.7rem 1rem;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);}
.budget-table td{padding:.65rem 1rem;border-bottom:1px solid rgba(255,255,255,.04);}
.budget-table tr:hover td{background:rgba(255,255,255,.02);}
.amount{color:var(--gold);font-weight:700;}
.total-row td{background:rgba(56,189,248,.06)!important;font-weight:700;color:var(--primary);border-top:1px solid var(--border);border-bottom:none;}
.lgbt-hero{background:linear-gradient(135deg,rgba(56,189,248,.09),rgba(192,132,252,.09),rgba(251,191,36,.04));border:1px solid var(--border);border-radius:14px;padding:1.75rem;margin-bottom:1.25rem;text-align:center;}
.lgbt-hero h2{font-size:1.4rem;font-weight:700;margin-bottom:.4rem;}
.lgbt-hero p{color:var(--muted);font-size:.82rem;max-width:580px;margin:0 auto;line-height:1.6;}
.rainbow-bar{height:4px;border-radius:2px;background:linear-gradient(90deg,#ff4d4d,#ff9f43,#ffd93d,#6bcb77,#4d96ff,#c44dff);margin:.9rem auto;max-width:180px;}
@media(max-width:900px){#mainLayout{grid-template-columns:1fr;height:auto;}#mainLayout .sidebar{max-height:none;border-right:none;}#map{height:380px;}}
</style>
</head>

<script>

const map=L.map('map',{center:[64.6,-19.5],zoom:6,zoomControl:true,attributionControl:false});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
let mapLayers=[];
function clearMap(){mapLayers.forEach(l=>map.removeLayer(l));mapLayers=[];}

function drawOverview(){
  clearMap();
  const colors=['#ff6b6b','#fbbf24','#4ade80','#38bdf8','#fb923c','#c084fc','#ff6b6b'];
  [ROUTES.day1,ROUTES.day2,ROUTES.day3,ROUTES.day4,ROUTES.day5,ROUTES.day6,ROUTES.day7].forEach((r,i)=>{
    mapLayers.push(L.polyline(r,{color:colors[i],weight:3,opacity:.85}).addTo(map));
  });
  [{c:[63.985,-22.605],n:'1',col:'#ff6b6b'},{c:[64.147,-21.943],n:'2',col:'#fbbf24'},
   {c:[63.615,-19.988],n:'3',col:'#4ade80'},{c:[63.419,-19.006],n:'4',col:'#38bdf8'},
   {c:[64.253,-15.208],n:'5',col:'#fb923c'},{c:[64.541,-21.924],n:'6',col:'#c084fc'},
   {c:[65.071,-22.732],n:'7',col:'#ff6b6b'}].forEach(s=>{
    const ic=L.divIcon({html:`<div style="width:24px;height:24px;background:${s.col};border-radius:50%;border:2px solid white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:white;box-shadow:0 2px 8px rgba(0,0,0,.6)">${s.n}</div>`,iconSize:[24,24],iconAnchor:[12,12],className:''});
    mapLayers.push(L.marker(s.c,{icon:ic}).addTo(map));
  });
  map.setView([64.5,-19.5],6);
}

function drawDay(key){
  clearMap();
  const day=DAYS[key],route=ROUTES[key];
  if(route) mapLayers.push(L.polyline(route,{color:day.color,weight:4,opacity:.9}).addTo(map));
  (day.stops||[]).forEach((s,i)=>{
    const ic=L.divIcon({html:`<div style="min-width:24px;height:24px;background:${day.color};border-radius:12px;border:2px solid white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:white;padding:0 5px;box-shadow:0 2px 8px rgba(0,0,0,.6)">${i+1}</div>`,iconSize:[24,24],iconAnchor:[12,12],className:''});
    mapLayers.push(L.marker(s.coords,{icon:ic}).bindPopup(`<div style="font-family:system-ui;max-width:200px"><strong>${s.name}</strong><br><small style="color:#94a3b8">${s.desc.substring(0,80)}…</small></div>`,{maxWidth:220}).addTo(map));
  });
  map.setView(day.center,day.zoom);
}

function focusStop(lat,lng){map.setView([lat,lng],13);}

function renderTags(tags){
  const l={must:'⭐ Must-See',book:'📅 Book Ahead',free:'✓ Free',paid:'€ Paid'};
  return(tags||[]).map(t=>`<span class="tag ${t}">${l[t]||t}</span>`).join('');
}

function renderVibes(vibes){
  const l={romantic:'💜 Romantic',local:'🧊 Local Pick',cheap:'✓ Budget',upscale:'✨ Upscale',must:'⭐ Must'};
  return(vibes||[]).map(v=>`<span class="vibe ${v}">${l[v]||v}</span>`).join('');
}

// ═══════════════════════════════════════════════
//  TAB SWITCHING
// ═══════════════════════════════════════════════
const TAB_ORDER=['overview','day1','day2','day3','day4','day5','day6','day7','tips','budget','lgbt'];
const FULLWIDTH=['tips','budget','lgbt'];

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{b.classList.toggle('active',TAB_ORDER[i]===tab);});
  const layout=document.getElementById('mainLayout'),sidebar=document.getElementById('sidebar'),mc=document.getElementById('mapContainer');
  if(FULLWIDTH.includes(tab)){
    layout.classList.add('fullwidth');mc.style.display='none';
    if(tab==='tips')sidebar.innerHTML=renderTips();
    else if(tab==='budget')sidebar.innerHTML=renderBudget();
    else if(tab==='lgbt')sidebar.innerHTML=renderLGBT();
  } else {
    layout.classList.remove('fullwidth');mc.style.display='block';
    setTimeout(()=>map.invalidateSize(),50);
    if(tab==='overview'){sidebar.innerHTML=renderOverview();drawOverview();}
    else{sidebar.innerHTML=renderDayContent(tab);drawDay(tab);}
  }
  sidebar.scrollTop=0;
}
switchTab('overview');
